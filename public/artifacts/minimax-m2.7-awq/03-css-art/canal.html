<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Amsterdam Canal at Night</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    :root {
      --night-sky: #0a1628;
      --sky-gradient: linear-gradient(180deg, #0a1628 0%, #1a2d4a 40%, #2d4a6a 70%, #3d5a7a 100%);
      --house-dark: #1a1a2e;
      --house-mid: #252540;
      --house-light: #2f2f50;
      --window-glow: #ffcc44;
      --window-glow-soft: rgba(255, 204, 68, 0.6);
      --canal-water: #1a2a3a;
      --water-dark: #0f1a24;
      --rain-color: rgba(180, 200, 220, 0.4);
      --ease-rain: linear;
    }

    body {
      overflow: hidden;
      background: var(--night-sky);
    }

    .scene {
      position: relative;
      width: 100vw;
      height: 100vh;
      background: var(--sky-gradient);
      overflow: hidden;
    }

    .stars {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 50%;
    }

    .star {
      position: absolute;
      background: rgba(255, 255, 255, 0.8);
      border-radius: 50%;
      animation: twinkle 3s ease-in-out infinite;
    }

    @keyframes twinkle {
      0%, 100% { opacity: 0.3; }
      50% { opacity: 1; }
    }

    .canal {
      position: absolute;
      bottom: 0;
      left: 0;
      width: 100%;
      height: 35%;
      background: linear-gradient(180deg, var(--canal-water) 0%, var(--water-dark) 100%);
    }

    .water-ripples {
      position: absolute;
      top: 0;
      left: 0;
      width: 200%;
      height: 100%;
      background: repeating-linear-gradient(
        90deg,
        transparent 0%,
        rgba(255, 255, 255, 0.02) 2%,
        transparent 4%
      );
      animation: ripple 8s linear infinite;
    }

    @keyframes ripple {
      0% { transform: translateX(0); }
      100% { transform: translateX(-50%); }
    }

    .houses {
      position: absolute;
      bottom: 35%;
      left: 0;
      width: 100%;
      height: 45%;
      display: flex;
      align-items: flex-end;
      justify-content: center;
      gap: 0;
    }

    .house {
      position: relative;
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    .house-body {
      position: relative;
      background: var(--house-dark);
      border: 2px solid rgba(255, 255, 255, 0.05);
    }

    .house-1 .house-body {
      width: 70px;
      height: 160px;
      background: linear-gradient(90deg, var(--house-dark) 0%, var(--house-mid) 50%, var(--house-dark) 100%);
    }

    .house-2 .house-body {
      width: 80px;
      height: 190px;
      background: linear-gradient(90deg, #1f1f38 0%, #2a2a48 50%, #1f1f38 100%);
    }

    .house-3 .house-body {
      width: 65px;
      height: 175px;
      background: linear-gradient(90deg, #222240 0%, #2d2d50 50%, #222240 100%);
    }

    .house-4 .house-body {
      width: 85px;
      height: 210px;
      background: linear-gradient(90deg, #1c1c35 0%, #282845 50%, #1c1c35 100%);
    }

    .house-5 .house-body {
      width: 60px;
      height: 155px;
      background: linear-gradient(90deg, #252545 0%, #303060 50%, #252545 100%);
    }

    .house-6 .house-body {
      width: 75px;
      height: 185px;
      background: linear-gradient(90deg, #1e1e3a 0%, #2a2a50 50%, #1e1e3a 100%);
    }

    .gable {
      position: absolute;
      top: -30px;
      width: 100%;
      height: 30px;
      background: var(--house-mid);
      clip-path: polygon(0 100%, 50% 0, 100% 100%);
    }

    .house-1 .gable { background: #252540; }
    .house-2 .gable { background: #222242; clip-path: polygon(0 100%, 50% 0, 100% 100%); }
    .house-3 .gable { background: #282848; clip-path: polygon(15% 100%, 50% 0, 85% 100%); }
    .house-4 .gable { background: #202040; clip-path: polygon(10% 100%, 50% 0, 90% 100%); }
    .house-5 .gable { background: #2a2a55; clip-path: polygon(20% 100%, 50% 0, 80% 100%); }
    .house-6 .gable { background: #242445; }

    .windows {
      position: absolute;
      top: 10px;
      left: 50%;
      transform: translateX(-50%);
      display: flex;
      flex-direction: column;
      gap: 20px;
      padding: 10px;
    }

    .window-row {
      display: flex;
      gap: 8px;
    }

    .window {
      width: 18px;
      height: 24px;
      background: var(--window-glow);
      border: 2px solid #3a3a55;
      box-shadow:
        0 0 10px var(--window-glow-soft),
        0 0 20px rgba(255, 180, 50, 0.4),
        0 0 30px rgba(255, 150, 50, 0.2);
      animation: windowFlicker 4s ease-in-out infinite;
    }

    .window.door {
      width: 14px;
      height: 35px;
      background: linear-gradient(180deg, #3a2a1a 0%, #2a1a0a 100%);
      box-shadow: none;
      border-color: #4a3a2a;
    }

    @keyframes windowFlicker {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.85; }
      75% { opacity: 0.95; }
    }

    .window:nth-child(2) { animation-delay: 0.5s; }
    .window:nth-child(3) { animation-delay: 1.2s; }
    .window:nth-child(4) { animation-delay: 0.8s; }
    .window:nth-child(5) { animation-delay: 2.1s; }
    .window:nth-child(6) { animation-delay: 0.3s; }

    .reflections {
      position: absolute;
      bottom: 0;
      left: 0;
      width: 100%;
      height: 35%;
      overflow: hidden;
    }

    .reflection-house {
      position: absolute;
      bottom: 0;
      transform: scaleY(-1);
      opacity: 0.15;
      filter: blur(2px) brightness(0.5);
      mask-image: linear-gradient(180deg, rgba(0,0,0,0.4) 0%, transparent 60%);
      -webkit-mask-image: linear-gradient(180deg, rgba(0,0,0,0.4) 0%, transparent 60%);
    }

    .reflection-house .house-body {
      background: var(--house-mid);
    }

    .reflection-1 { left: calc(15% - 35px); }
    .reflection-2 { left: calc(30% - 40px); }
    .reflection-3 { left: calc(50% - 32px); }
    .reflection-4 { left: calc(65% - 42px); }
    .reflection-5 { left: calc(75% - 30px); }
    .reflection-6 { left: calc(85% - 37px); }

    .reflection-windows {
      position: absolute;
      top: 10px;
      left: 50%;
      transform: translateX(-50%);
      display: flex;
      flex-direction: column;
      gap: 20px;
      padding: 10px;
    }

    .reflection-window {
      width: 18px;
      height: 24px;
      background: var(--window-glow);
      opacity: 0.6;
      box-shadow: 0 0 15px var(--window-glow-soft);
    }

    .bridge {
      position: absolute;
      bottom: 32%;
      left: 0;
      width: 100%;
      height: 8%;
      display: flex;
      align-items: flex-end;
      justify-content: center;
    }

    .bridge-deck {
      width: 100%;
      height: 20px;
      background: linear-gradient(180deg, #2a2a35 0%, #1a1a25 50%, #252530 100%);
      border-top: 3px solid #3a3a45;
    }

    .bridge-rail {
      position: absolute;
      top: -40px;
      width: 100%;
      height: 40px;
      display: flex;
      justify-content: space-around;
      padding: 0 20px;
    }

    .rail-post {
      width: 8px;
      height: 40px;
      background: linear-gradient(90deg, #3a3a45 0%, #4a4a55 50%, #3a3a45 100%);
      border-radius: 2px 2px 0 0;
    }

    .rail-bar {
      position: absolute;
      top: 10px;
      left: 20px;
      right: 20px;
      height: 4px;
      background: linear-gradient(180deg, #4a4a55 0%, #3a3a45 100%);
    }

    .rain {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      pointer-events: none;
      overflow: hidden;
    }

    .raindrop {
      position: absolute;
      width: 1px;
      height: 15px;
      background: linear-gradient(180deg, transparent 0%, var(--rain-color) 50%, transparent 100%);
      animation: fall linear infinite;
      opacity: 0.6;
    }

    @keyframes fall {
      0% {
        transform: translateY(-100px) translateX(0);
        opacity: 0;
      }
      10% {
        opacity: 0.6;
      }
      90% {
        opacity: 0.6;
      }
      100% {
        transform: translateY(100vh) translateX(20px);
        opacity: 0;
      }
    }

    .rain-layer {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
    }

    .rain-layer-1 .raindrop {
      animation-duration: 0.8s;
      animation-delay: 0s;
    }

    .rain-layer-2 .raindrop {
      animation-duration: 1s;
      animation-delay: 0.3s;
      opacity: 0.4;
    }

    .rain-layer-3 .raindrop {
      animation-duration: 1.2s;
      animation-delay: 0.6s;
      opacity: 0.3;
    }

    .bicycle {
      position: absolute;
      bottom: calc(35% + 5%);
      right: 15%;
      width: 60px;
      height: 50px;
    }

    .bike-frame {
      position: relative;
      width: 100%;
      height: 100%;
    }

    .wheel {
      position: absolute;
      border: 3px solid #2a2a2a;
      border-radius: 50%;
      background: transparent;
    }

    .wheel-back {
      width: 28px;
      height: 28px;
      bottom: 5px;
      left: 0;
    }

    .wheel-front {
      width: 28px;
      height: 28px;
      bottom: 5px;
      right: 5px;
    }

    .wheel::after {
      content: '';
      position: absolute;
      top: 50%;
      left: 50%;
      width: 4px;
      height: 4px;
      background: #3a3a3a;
      border-radius: 50%;
      transform: translate(-50%, -50%);
    }

    .frame-line {
      position: absolute;
      background: #2a2a2a;
      height: 2px;
    }

    .frame-top {
      width: 25px;
      bottom: 28px;
      left: 15px;
      transform: rotate(-15deg);
    }

    .frame-seat {
      width: 15px;
      bottom: 30px;
      left: 8px;
      transform: rotate(70deg);
    }

    .frame-down {
      width: 20px;
      bottom: 8px;
      left: 10px;
      transform: rotate(60deg);
    }

    .frame-front {
      width: 18px;
      bottom: 20px;
      right: 8px;
      transform: rotate(-40deg);
    }

    .handlebar {
      position: absolute;
      width: 12px;
      height: 2px;
      background: #2a2a2a;
      top: 10px;
      right: 8px;
    }

    .seat {
      position: absolute;
      width: 10px;
      height: 4px;
      background: #1a1a1a;
      border-radius: 2px;
      bottom: 32px;
      left: 5px;
    }

    .pedal-area {
      position: absolute;
      bottom: 10px;
      left: 12px;
      width: 12px;
      height: 6px;
      background: #2a2a2a;
      border-radius: 1px;
    }

    .splash {
      position: absolute;
      bottom: 35%;
      width: 100%;
      height: 5px;
      pointer-events: none;
    }

    .splash-drop {
      position: absolute;
      width: 2px;
      height: 2px;
      background: rgba(180, 200, 220, 0.5);
      border-radius: 50%;
      animation: splash 1.5s ease-out infinite;
    }

    @keyframes splash {
      0% {
        transform: translate(0, 0) scale(1);
        opacity: 0.6;
      }
      100% {
        transform: translate(var(--splash-x), 10px) scale(0);
        opacity: 0;
      }
    }

    .atmosphere-haze {
      position: absolute;
      bottom: 30%;
      left: 0;
      width: 100%;
      height: 20%;
      background: linear-gradient(180deg, transparent 0%, rgba(30, 50, 70, 0.3) 100%);
      pointer-events: none;
    }

    .lamp-post {
      position: absolute;
      bottom: calc(35% + 20px);
      width: 6px;
      height: 80px;
      background: linear-gradient(180deg, #1a1a1a 0%, #2a2a2a 100%);
    }

    .lamp-post.left {
      left: 8%;
    }

    .lamp-post.right {
      right: 12%;
    }

    .lamp-head {
      position: absolute;
      top: -15px;
      left: 50%;
      transform: translateX(-50%);
      width: 20px;
      height: 15px;
      background: #2a2a2a;
      border-radius: 3px 3px 0 0;
    }

    .lamp-glow {
      position: absolute;
      top: 5px;
      left: 50%;
      transform: translateX(-50%);
      width: 30px;
      height: 20px;
      background: radial-gradient(ellipse at center, rgba(255, 220, 150, 0.3) 0%, transparent 70%);
    }

    @media (prefers-reduced-motion: reduce) {
      .raindrop {
        animation: none;
        opacity: 0.3;
      }
      .star {
        animation: none;
      }
      .window {
        animation: none;
      }
      .water-ripples {
        animation: none;
      }
    }
  </style>
</head>
<body>
  <div class="scene">
    <div class="stars">
      <div class="star" style="left: 10%; top: 5%; width: 2px; height: 2px; animation-delay: 0s;"></div>
      <div class="star" style="left: 25%; top: 12%; width: 1px; height: 1px; animation-delay: 0.5s;"></div>
      <div class="star" style="left: 40%; top: 3%; width: 2px; height: 2px; animation-delay: 1s;"></div>
      <div class="star" style="left: 55%; top: 8%; width: 1px; height: 1px; animation-delay: 1.5s;"></div>
      <div class="star" style="left: 70%; top: 15%; width: 1px; height: 1px; animation-delay: 2s;"></div>
      <div class="star" style="left: 85%; top: 6%; width: 2px; height: 2px; animation-delay: 0.3s;"></div>
      <div class="star" style="left: 15%; top: 18%; width: 1px; height: 1px; animation-delay: 0.8s;"></div>
      <div class="star" style="left: 60%; top: 2%; width: 1px; height: 1px; animation-delay: 1.2s;"></div>
      <div class="star" style="left: 80%; top: 20%; width: 1px; height: 1px; animation-delay: 1.8s;"></div>
      <div class="star" style="left: 35%; top: 10%; width: 1px; height: 1px; animation-delay: 2.2s;"></div>
    </div>

    <div class="houses">
      <div class="house house-1">
        <div class="gable"></div>
        <div class="house-body">
          <div class="windows">
            <div class="window-row">
              <div class="window" style="animation-delay: 0s;"></div>
            </div>
            <div class="window-row">
              <div class="window" style="animation-delay: 0.7s;"></div>
            </div>
            <div class="window-row">
              <div class="window door"></div>
            </div>
          </div>
        </div>
      </div>

      <div class="house house-2">
        <div class="gable"></div>
        <div class="house-body">
          <div class="windows">
            <div class="window-row">
              <div class="window" style="animation-delay: 0.2s;"></div>
              <div class="window" style="animation-delay: 0.4s;"></div>
            </div>
            <div class="window-row">
              <div class="window" style="animation-delay: 0.9s;"></div>
              <div class="window" style="animation-delay: 1.1s;"></div>
            </div>
            <div class="window-row">
              <div class="window" style="animation-delay: 0.3s;"></div>
            </div>
          </div>
        </div>
      </div>

      <div class="house house-3">
        <div class="gable"></div>
        <div class="house-body">
          <div class="windows">
            <div class="window-row">
              <div class="window" style="animation-delay: 1.3s;"></div>
            </div>
            <div class="window-row">
              <div class="window" style="animation-delay: 0.6s;"></div>
              <div class="window" style="animation-delay: 1.5s;"></div>
            </div>
            <div class="window-row">
              <div class="window door"></div>
            </div>
          </div>
        </div>
      </div>

      <div class="house house-4">
        <div class="gable"></div>
        <div class="house-body">
          <div class="windows">
            <div class="window-row">
              <div class="window" style="animation-delay: 0.8s;"></div>
              <div class="window" style="animation-delay: 1.2s;"></div>
            </div>
            <div class="window-row">
              <div class="window" style="animation-delay: 1.8s;"></div>
              <div class="window" style="animation-delay: 0.1s;"></div>
            </div>
            <div class="window-row">
              <div class="window" style="animation-delay: 2s;"></div>
              <div class="window" style="animation-delay: 0.5s;"></div>
            </div>
          </div>
        </div>
      </div>

      <div class="house house-5">
        <div class="gable"></div>
        <div class="house-body">
          <div class="windows">
            <div class="window-row">
              <div class="window" style="animation-delay: 1.6s;"></div>
            </div>
            <div class="window-row">
              <div class="window" style="animation-delay: 0.9s;"></div>
            </div>
            <div class="window-row">
              <div class="window door"></div>
            </div>
          </div>
        </div>
      </div>

      <div class="house house-6">
        <div class="gable"></div>
        <div class="house-body">
          <div class="windows">
            <div class="window-row">
              <div class="window" style="animation-delay: 1.4s;"></div>
              <div class="window" style="animation-delay: 0.2s;"></div>
            </div>
            <div class="window-row">
              <div class="window" style="animation-delay: 1.7s;"></div>
              <div class="window" style="animation-delay: 0.6s;"></div>
            </div>
            <div class="window-row">
              <div class="window" style="animation-delay: 2.1s;"></div>
            </div>
          </div>
        </div>
      </div>
    </div>

    <div class="bridge">
      <div class="bridge-deck">
        <div class="bridge-rail">
          <div class="rail-bar"></div>
          <div class="rail-post"></div>
          <div class="rail-post"></div>
          <div class="rail-post"></div>
          <div class="rail-post"></div>
          <div class="rail-post"></div>
          <div class="rail-post"></div>
          <div class="rail-post"></div>
          <div class="rail-post"></div>
          <div class="rail-post"></div>
          <div class="rail-post"></div>
        </div>
      </div>
    </div>

    <div class="bicycle">
      <div class="bike-frame">
        <div class="wheel wheel-back"></div>
        <div class="wheel wheel-front"></div>
        <div class="frame-line frame-top"></div>
        <div class="frame-line frame-seat"></div>
        <div class="frame-line frame-down"></div>
        <div class="frame-line frame-front"></div>
        <div class="handlebar"></div>
        <div class="seat"></div>
        <div class="pedal-area"></div>
      </div>
    </div>

    <div class="lamp-post left">
      <div class="lamp-head"></div>
      <div class="lamp-glow"></div>
    </div>
    <div class="lamp-post right">
      <div class="lamp-head"></div>
      <div class="lamp-glow"></div>
    </div>

    <div class="canal">
      <div class="water-ripples"></div>
    </div>

    <div class="reflections">
      <div class="reflection-house reflection-1">
        <div class="house-body">
          <div class="reflection-windows">
            <div class="reflection-window"></div>
            <div class="reflection-window"></div>
          </div>
        </div>
      </div>
      <div class="reflection-house reflection-2">
        <div class="house-body">
          <div class="reflection-windows">
            <div class="reflection-window"></div>
            <div class="reflection-window"></div>
          </div>
        </div>
      </div>
      <div class="reflection-house reflection-3">
        <div class="house-body">
          <div class="reflection-windows">
            <div class="reflection-window"></div>
            <div class="reflection-window"></div>
          </div>
        </div>
      </div>
      <div class="reflection-house reflection-4">
        <div class="house-body">
          <div class="reflection-windows">
            <div class="reflection-window"></div>
            <div class="reflection-window"></div>
          </div>
        </div>
      </div>
      <div class="reflection-house reflection-5">
        <div class="house-body">
          <div class="reflection-windows">
            <div class="reflection-window"></div>
            <div class="reflection-window"></div>
          </div>
        </div>
      </div>
      <div class="reflection-house reflection-6">
        <div class="house-body">
          <div class="reflection-windows">
            <div class="reflection-window"></div>
            <div class="reflection-window"></div>
          </div>
        </div>
      </div>
    </div>

    <div class="atmosphere-haze"></div>

    <div class="rain">
      <div class="rain-layer rain-layer-1">
        <div class="raindrop" style="left: 5%; animation-delay: 0s;"></div>
        <div class="raindrop" style="left: 15%; animation-delay: 0.1s;"></div>
        <div class="raindrop" style="left: 25%; animation-delay: 0.2s;"></div>
        <div class="raindrop" style="left: 35%; animation-delay: 0.15s;"></div>
        <div class="raindrop" style="left: 45%; animation-delay: 0.25s;"></div>
        <div class="raindrop" style="left: 55%; animation-delay: 0.05s;"></div>
        <div class="raindrop" style="left: 65%; animation-delay: 0.3s;"></div>
        <div class="raindrop" style="left: 75%; animation-delay: 0.12s;"></div>
        <div class="raindrop" style="left: 85%; animation-delay: 0.22s;"></div>
        <div class="raindrop" style="left: 95%; animation-delay: 0.08s;"></div>
        <div class="raindrop" style="left: 10%; animation-delay: 0.35s;"></div>
        <div class="raindrop" style="left: 20%; animation-delay: 0.18s;"></div>
        <div class="raindrop" style="left: 30%; animation-delay: 0.4s;"></div>
        <div class="raindrop" style="left: 50%; animation-delay: 0.28s;"></div>
        <div class="raindrop" style="left: 70%; animation-delay: 0.38s;"></div>
        <div class="raindrop" style="left: 90%; animation-delay: 0.45s;"></div>
      </div>
      <div class="rain-layer rain-layer-2">
        <div class="raindrop" style="left: 8%; animation-delay: 0.15s;"></div>
