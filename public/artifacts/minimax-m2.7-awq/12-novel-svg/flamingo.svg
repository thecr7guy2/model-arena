<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600">
  <defs>
    <linearGradient id="skyGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1a2e"/>
      <stop offset="100%" style="stop-color:#4a4e69"/>
    </linearGradient>
    <linearGradient id="fiberGlow" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#00ff88">
        <animate attributeName="stop-color" values="#00ff88;#00ffff;#ff00ff;#00ff88" dur="2s" repeatCount="indefinite"/>
      </stop>
      <stop offset="50%" style="stop-color:#00ffff">
        <animate attributeName="stop-color" values="#00ffff;#ff00ff;#00ff88;#00ffff" dur="2s" repeatCount="indefinite"/>
      </stop>
      <stop offset="100%" style="stop-color:#ff00ff">
        <animate attributeName="stop-color" values="#ff00ff;#00ff88;#00ffff;#ff00ff" dur="2s" repeatCount="indefinite"/>
      </stop>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="4" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="softGlow">
      <feGaussianBlur stdDeviation="2" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Sky background -->
  <rect width="800" height="600" fill="url(#skyGrad)"/>

  <!-- Lightning -->
  <g>
    <polygon points="380,0 420,120 390,120 440,280 410,280 460,400" fill="#ffff00" opacity="0.9" filter="url(#glow)">
      <animate attributeName="opacity" values="0.9;0.3;1;0.9;0.1;0.9" dur="0.5s" repeatCount="indefinite"/>
    </polygon>
    <polygon points="600,0 630,80 610,80 660,200 635,200 680,300" fill="#ffff00" opacity="0.7" filter="url(#glow)">
      <animate attributeName="opacity" values="0.1;0.8;0.2;0.7;0.1" dur="0.7s" repeatCount="indefinite"/>
    </polygon>
  </g>

  <!-- Rain -->
  <g stroke="#6b8cae" stroke-width="1" opacity="0.4">
    <line x1="50" y1="0" x2="30" y2="80"><animate attributeName="y1" values="0;600" dur="0.8s" repeatCount="indefinite"/></line>
    <line x1="120" y1="0" x2="100" y2="80"><animate attributeName="y1" values="0;600" dur="0.9s" repeatCount="indefinite"/></line>
    <line x1="200" y1="0" x2="180" y2="80"><animate attributeName="y1" values="0;600" dur="0.7s" repeatCount="indefinite"/></line>
    <line x1="280" y1="0" x2="260" y2="80"><animate attributeName="y1" values="0;600" dur="0.85s" repeatCount="indefinite"/></line>
    <line x1="520" y1="0" x2="500" y2="80"><animate attributeName="y1" values="0;600" dur="0.75s" repeatCount="indefinite"/></line>
    <line x1="620" y1="0" x2="600" y2="80"><animate attributeName="y1" values="0;600" dur="0.9s" repeatCount="indefinite"/></line>
    <line x1="720" y1="0" x2="700" y2="80"><animate attributeName="y1" values="0;600" dur="0.8s" repeatCount="indefinite"/></line>
    <line x1="100" y1="100" x2="80" y2="180"><animate attributeName="y1" values="100;700" dur="0.8s" repeatCount="indefinite"/></line>
    <line x1="350" y1="100" x2="330" y2="180"><animate attributeName="y1" values="100;700" dur="0.9s" repeatCount="indefinite"/></line>
    <line x1="550" y1="100" x2="530" y2="180"><animate attributeName="y1" values="100;700" dur="0.85s" repeatCount="indefinite"/></line>
  </g>

  <!-- Utility Pole -->
  <rect x="390" y="150" width="20" height="450" fill="#5c4033"/>
  <rect x="385" y="145" width="30" height="10" fill="#4a3728"/>
  <rect x="385" y="200" width="30" height="8" fill="#4a3728"/>
  <rect x="385" y="280" width="30" height="8" fill="#4a3728"/>
  <!-- Cross arms -->
  <rect x="350" y="210" width="100" height="6" fill="#4a3728"/>
  <rect x="350" y="290" width="100" height="6" fill="#4a3728"/>
  <!-- Insulators -->
  <ellipse cx="360" cy="213" rx="5" ry="8" fill="#8b4513"/>
  <ellipse cx="440" cy="213" rx="5" ry="8" fill="#8b4513"/>
  <ellipse cx="360" cy="293" rx="5" ry="8" fill="#8b4513"/>
  <ellipse cx="440" cy="293" rx="5" ry="8" fill="#8b4513"/>

  <!-- Flamingo on top -->
  <g transform="translate(400, 70)">
    <!-- Body -->
    <ellipse cx="0" cy="0" rx="25" ry="18" fill="#ff6b9d"/>
    <!-- Neck -->
    <path d="M-5,-5 Q-15,-30 -5,-55 Q5,-70 15,-65" stroke="#ff6b9d" stroke-width="8" fill="none"/>
    <!-- Head -->
    <circle cx="15" cy="-65" r="12" fill="#ff6b9d"/>
    <!-- Beak -->
    <path d="M25,-68 L40,-65 L25,-62 Z" fill="#2a2a2a"/>
    <path d="M27,-67 L35,-65 L27,-64" fill="#ff4444"/>
    <!-- Eye -->
    <circle cx="12" cy="-68" r="3" fill="#2a2a2a"/>
    <circle cx="11" cy="-69" r="1" fill="#ffffff"/>
    <!-- Legs -->
    <line x1="-8" y1="15" x2="-10" y2="50" stroke="#ffcc88" stroke-width="3"/>
    <line x1="8" y1="15" x2="10" y2="50" stroke="#ffcc88" stroke-width="3"/>
    <line x1="-10" y1="50" x2="-5" y2="55" stroke="#2a2a2a" stroke-width="2"/>
    <line x1="10" y1="50" x2="15" y2="55" stroke="#2a2a2a" stroke-width="2"/>
    <!-- Hard Hat -->
    <ellipse cx="10" cy="-78" rx="18" ry="6" fill="#ffdd00"/>
    <path d="M-10,-78 Q10,-100 30,-78" fill="#ffdd00"/>
    <rect x="8" y="-95" width="20" height="15" fill="#ffdd00" rx="2"/>
    <rect x="25" y="-92" width="12" height="3" fill="#ffdd00"/>
  </g>

  <!-- Fiber optic cable glowing -->
  <g filter="url(#glow)">
    <path d="M355,210 Q400,200 445,210" stroke="url(#fiberGlow)" stroke-width="4" fill="none"/>
    <path d="M355,210 L355,145" stroke="url(#fiberGlow)" stroke-width="3" fill="none"/>
    <path d="M445,210 L445,145" stroke="url(#fiberGlow)" stroke-width="3" fill="none"/>
    <!-- Splicing point -->
    <circle cx="400" cy="203" r="8" fill="#ffffff" opacity="0.8">
      <animate attributeName="r" values="8;10;8" dur="1s" repeatCount="indefinite"/>
    </circle>
    <circle cx="400" cy="203" r="4" fill="#00ff88">
      <animate attributeName="fill" values="#00ff88;#00ffff;#ff00ff;#00ff88" dur="0.5s" repeatCount="indefinite"/>
    </circle>
  </g>

  <!-- Ground -->
  <ellipse cx="400" cy="600" rx="500" ry="50" fill="#2d4a3e"/>

  <!-- Picnic blanket -->
  <g transform="translate(550, 520)">
    <rect x="0" y="0" width="150" height="100" fill="#cc4444" rx="5"/>
    <rect x="0" y="0" width="150" height="100" fill="none" stroke="#ffffff" stroke-width="8" stroke-dasharray="20,15" rx="5"/>
  </g>

  <!-- Hedgehog 1 with umbrella -->
  <g transform="translate(580, 480)">
    <!-- Body (ball shape) -->
    <ellipse cx="0" cy="0" rx="22" ry="20" fill="#8b6914"/>
    <!-- Spines -->
    <g stroke="#4a3728" stroke-width="2">
      <line x1="-15" y1="-10" x2="-22" y2="-20"/>
      <line x1="-8" y1="-15" x2="-12" y2="-28"/>
      <line x1="0" y1="-18" x2="0" y2="-32"/>
      <line x1="8" y1="-15" x2="12" y2="-28"/>
      <line x1="15" y1="-10" x2="22" y2="-20"/>
      <line x1="-18" y1="0" x2="-28" y2="-5"/>
      <line x1="18" y1="0" x2="28" y2="-5"/>
    </g>
    <!-- Face -->
    <ellipse cx="0" cy="5" rx="14" ry="12" fill="#d4a853"/>
    <!-- Nose -->
    <ellipse cx="10" cy="8" rx="4" ry="3" fill="#2a2a2a"/>
    <!-- Eye -->
    <circle cx="5" cy="2" r="3" fill="#2a2a2a"/>
    <circle cx="4" cy="1" r="1" fill="#ffffff"/>
    <!-- Legs -->
    <ellipse cx="-10" cy="18" rx="6" ry="4" fill="#d4a853"/>
    <ellipse cx="10" cy="18" rx="6" ry="4" fill="#d4a853"/>
    <!-- Umbrella -->
    <line x1="25" y1="0" x2="25" y2="-35" stroke="#8b4513" stroke-width="2"/>
    <path d="M5,-35 Q25,-55 45,-35" fill="#ff6b6b"/>
    <circle cx="25" cy="-52" r="3" fill="#8b4513"/>
  </g>

  <!-- Hedgehog 2 -->
  <g transform="translate(640, 500)">
    <ellipse cx="0" cy="0" rx="20" ry="18" fill="#8b6914"/>
    <g stroke="#4a3728" stroke-width="2">
      <line x1="-14" y1="-8" x2="-20" y2="-18"/>
      <line x1="-7" y1="-13" x2="-10" y2="-25"/>
      <line x1="0" y1="-16" x2="0" y2="-28"/>
      <line x1="7" y1="-13" x2="10" y2="-25"/>
      <line x1="14" y1="-8" x2="20" y2="-18"/>
    </g>
    <ellipse cx="0" cy="5" rx="12" ry="10" fill="#d4a853"/>
    <ellipse cx="8" cy="7" rx="3" ry="2.5" fill="#2a2a2a"/>
    <circle cx="4" cy="2" r="2.5" fill="#2a2a2a"/>
    <circle cx="3" cy="1" r="0.8" fill="#ffffff"/>
    <ellipse cx="-8" cy="16" rx="5" ry="3" fill="#d4a853"/>
    <ellipse cx="8" cy="16" rx="5" ry="3" fill="#d4a853"/>
  </g>

  <!-- Hedgehog 3 (lying down) -->
  <g transform="translate(610, 540)">
    <ellipse cx="0" cy="0" rx="22" ry="12" fill="#8b6914"/>
    <g stroke="#4a3728" stroke-width="2">
      <line x1="-18" y1="-8" x2="-25" y2="-15"/>
      <line x1="-10" y1="-10" x2="-14" y2="-20"/>
      <line x1="0" y1="-11" x2="0" y2="-22"/>
      <line x1="10" y1="-10" x2="14" y2="-20"/>
      <line x1="18" y1="-8" x2="25" y2="-15"/>
    </g>
    <ellipse cx="-5" cy="2" rx="14" ry="9" fill="#d4a853"/>
    <ellipse cx="-15" cy="5" rx="3" ry="2" fill="#2a2a2a"/>
    <circle cx="-20" cy="-1" r="2" fill="#2a2a2a"/>
    <circle cx="-21" cy="-2" r="0.7" fill="#ffffff"/>
    <ellipse cx="-15" cy="10" rx="5" ry="3" fill="#d4a853"/>
    <ellipse cx="10" cy="10" rx="5" ry="3" fill="#d4a853"/>
  </g>

  <!-- Grass tufts -->
  <g fill="#3d5a4a">
    <path d="M50,600 Q55,580 60,600"/>
    <path d="M55,600 Q58,575 65,600"/>
    <path d="M100,600 Q105,580 110,600"/>
    <path d="M200,600 Q205,585 210,600"/>
    <path d="M750,600 Q755,580 760,600"/>
    <path d="M760,600 Q763,575 770,600"/>
  </g>
</svg>