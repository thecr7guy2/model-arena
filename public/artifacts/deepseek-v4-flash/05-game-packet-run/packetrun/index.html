<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PACKET RUN</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{
  background:#050510;
  display:flex;
  justify-content:center;
  align-items:center;
  height:100vh;
  overflow:hidden;
  font-family:monospace;
}
canvas{
  image-rendering:pixelated;
  box-shadow:0 0 60px rgba(0,255,255,0.08),0 0 120px rgba(0,255,255,0.04);
  border-radius:4px;
}
@media(prefers-reduced-motion:reduce){
  canvas{animation:none}
}
</style>
</head>
<body>
<canvas id="c"></canvas>
<script>
// ────────────────────────────── SETUP ──────────────────────────────
const canvas=document.getElementById('c');
const ctx=canvas.getContext('2d');
const W=800,H=600;
canvas.width=W;canvas.height=H;
const scaleX=()=>canvas.clientWidth/W;
const scaleY=()=>canvas.clientHeight/H;

// ────────────────────────────── AUDIO ──────────────────────────────
let actx=null;
function initAudio(){if(!actx)actx=new(window.AudioContext||window.webkitAudioContext)()}
function playTone(freq,dur,type,vol,delay){
  if(!actx)return;
  const t=actx.currentTime+(delay||0);
  const o=actx.createOscillator();
  const g=actx.createGain();
  o.type=type||'sine';o.frequency.setValueAtTime(freq,t);
  g.gain.setValueAtTime(vol||0.15,t);
  g.gain.exponentialRampToValueAtTime(0.001,t+dur);
  o.connect(g);g.connect(actx.destination);
  o.start(t);o.stop(t+dur);
}
function playNoise(dur,vol,delay){
  if(!actx)return;
  const t=actx.currentTime+(delay||0);
  const buf=actx.createBuffer(1,actx.sampleRate*dur,actx.sampleRate);
  const d=buf.getChannelData(0);
  for(let i=0;i<d.length;i++)d[i]=Math.random()*2-1;
  const src=actx.createBufferSource();
  src.buffer=buf;
  const g=actx.createGain();
  g.gain.setValueAtTime(vol||0.1,t);
  g.gain.exponentialRampToValueAtTime(0.001,t+dur);
  src.connect(g);g.connect(actx.destination);
  src.start(t);src.stop(t+dur);
}
function sfxPickup(){playTone(880,0.08,'sine',0.12);setTimeout(()=>playTone(1100,0.1,'sine',0.1),50)}
function sfxDeath(){playTone(200,0.4,'sawtooth',0.15);playNoise(0.3,0.1,0)}
function sfxBossAppear(){playTone(100,0.5,'sawtooth',0.15);setTimeout(()=>playTone(150,0.4,'sawtooth',0.12),200);setTimeout(()=>playTone(200,0.3,'sawtooth',0.1),400)}
function sfxBossHit(){playTone(160,0.2,'square',0.08);playNoise(0.15,0.06,0)}
function sfxShoot(){playTone(300,0.05,'square',0.04)}
function sfxWin(){playTone(523,0.15,'sine',0.12);setTimeout(()=>playTone(659,0.15,'sine',0.12),150);setTimeout(()=>playTone(784,0.3,'sine',0.15),300)}
function sfxMenuBlip(){playTone(660,0.04,'sine',0.06)}

// ────────────────────────────── GAME STATE ──────────────────────────
const G={
  state:'menu', // menu | countdown | playing | bossIntro | boss | gameover | victory
  score:0,
  highScore:parseInt(localStorage.getItem('packetrun_high'))||0,
  ackCount:0,
  scrollY:0,
  scrollSpeed:180,
  difficulty:1,
  time:0,
  bossTimer:0,
  bossPhase:0,
  shake:{x:0,y:0,intensity:0,decay:0.9},
  countdownTimer:0,
  bossSpawned:false,
  flashAlpha:0,
};

// ────────────────────────────── ENTITIES ────────────────────────────
let player={x:W/2,y:H-80,w:18,h:20,speed:380,trail:[],pulseTimer:0};
let firewalls=[];
let lossZones=[];
let acks=[];
let particles=[];
let boss=null;
let bossBullets=[];
let ackOrbiters=[];  // ACKs orbiting player during boss fight
let floatingTexts=[];

// ────────────────────────────── INPUT ──────────────────────────────
const keys={};
document.addEventListener('keydown',e=>{
  const k=e.key;
  if(k===' '||k==='Space'){
    e.preventDefault();
    initAudio();
    if(G.state==='menu'||G.state==='gameover'||G.state==='victory'){
      sfxMenuBlip();G.state='countdown';G.countdownTimer=2;resetGame();
    }
  }
  keys[k]=true;keys['Space']=k===' '||k==='Space'?true:keys['Space'];
});
document.addEventListener('keyup',e=>{
  const k=e.key;
  keys[k]=false;keys['Space']=k===' '||k==='Space'?false:keys['Space'];
});

// ────────────────────────────── HELPERS ─────────────────────────────
function lerp(a,b,t){return a+(b-a)*t}
function rand(a,b){return Math.random()*(b-a)+a}
function randInt(a,b){return Math.floor(rand(a,b))}
function clamp(v,mi,ma){return Math.max(mi,Math.min(ma,v))}
function dist(x1,y1,x2,y2){return Math.hypot(x2-x1,y2-y1)}
function rectOverlap(a,b){
  return a.x<b.x+b.w&&a.x+a.w>b.x&&a.y<b.y+b.h&&a.y+a.h>b.y;
}
function pointInCircle(px,py,cx,cy,cr){return dist(px,py,cx,cy)<cr}

// ────────────────────────────── PARTICLES ───────────────────────────
function spawnParticles(x,y,count,color,opts={}){
  for(let i=0;i<count;i++){
    const angle=rand(0,Math.PI*2);
    const speed=rand(opts.minSpeed||40,opts.maxSpeed||200);
    particles.push({
      x,y,
      vx:Math.cos(angle)*speed,
      vy:Math.sin(angle)*speed,
      life:rand(opts.minLife||0.3,opts.maxLife||0.8),
      maxLife:1,
      color,
      size:rand(opts.minSize||2,opts.maxSize||5),
      gravity:opts.gravity||0,
    });
  }
}
function updateParticles(dt){
  for(let i=particles.length-1;i>=0;i--){
    const p=particles[i];
    p.x+=p.vx*dt;p.y+=p.vy*dt;
    p.vy+=p.gravity*dt;
    p.life-=dt;
    if(p.life<=0){particles.splice(i,1);continue;}
  }
}
function renderParticles(){
  for(const p of particles){
    const alpha=clamp(p.life/0.8,0,1);
    ctx.globalAlpha=alpha;
    ctx.fillStyle=p.color;
    ctx.beginPath();
    ctx.arc(p.x,p.y,p.size*alpha,0,Math.PI*2);
    ctx.fill();
  }
  ctx.globalAlpha=1;
}

// ────────────────────────────── FLOATING TEXT ──────────────────────
function addFloatingText(x,y,text,color){
  floatingTexts.push({x,y,text,color,life:0.8,dy:-60});
}
function updateFloatingText(dt){
  for(let i=floatingTexts.length-1;i>=0;i--){
    const f=floatingTexts[i];
    f.y+=f.dy*dt;
    f.life-=dt;
    if(f.life<=0){floatingTexts.splice(i,1);}
  }
}
function renderFloatingText(){
  for(const f of floatingTexts){
    ctx.globalAlpha=clamp(f.life/0.4,0,1);
    ctx.fillStyle=f.color;
    ctx.font='bold 14px monospace';
    ctx.textAlign='center';
    ctx.fillText(f.text,f.x,f.y);
  }
  ctx.globalAlpha=1;
}

// ────────────────────────────── SCREEN SHAKE ────────────────────────
function shake(intensity){
  G.shake.intensity=Math.max(G.shake.intensity,intensity);
}
function updateShake(dt){
  const s=G.shake;
  if(s.intensity>0.5){
    s.x=(Math.random()-0.5)*2*s.intensity;
    s.y=(Math.random()-0.5)*2*s.intensity;
    s.intensity*=Math.pow(s.decay,dt*60);
  }else{
    s.x=0;s.y=0;s.intensity=0;
  }
}

// ────────────────────────────── PLAYER ──────────────────────────────
function resetPlayer(){
  player.x=W/2;player.y=H-80;
  player.trail=[];
}
function updatePlayer(dt){
  const p=player;
  let dx=0,dy=0;
  if(keys['ArrowLeft']||keys['a'])dx=-1;
  if(keys['ArrowRight']||keys['d'])dx=1;
  if(keys['ArrowUp']||keys['w'])dy=-1;
  if(keys['ArrowDown']||keys['s'])dy=1;
  if(dx&&dy){dx*=0.707;dy*=0.707;}
  p.x+=dx*p.speed*dt;
  p.y+=dy*p.speed*dt;
  p.x=clamp(p.x,20,W-20);
  p.y=clamp(p.y,30,H-30);

  // Trail
  p.trail.unshift({x:p.x,y:p.y});
  if(p.trail.length>12)p.trail.pop();

  // Motion particles
  if((dx||dy)&&Math.random()<0.3){
    particles.push({
      x:p.x+rand(-6,6),y:p.y+rand(-6,6),
      vx:rand(-5,5)-dx*20,vy:rand(-5,5)-dy*20,
      life:rand(0.15,0.3),
      maxLife:0.3,
      color:'rgba(0,255,255,0.3)',
      size:rand(1,3),
      gravity:0,
    });
  }

  // Pulse decay
  if(p.pulseTimer>0)p.pulseTimer-=dt;
}
function renderPlayer(){
  const p=player;
  // Trail
  for(let i=0;i<p.trail.length;i++){
    const t=p.trail[i];
    const alpha=(1-i/p.trail.length)*0.3;
    const size=lerp(4,10,i/p.trail.length);
    ctx.globalAlpha=alpha;
    ctx.fillStyle='#00ffff';
    ctx.beginPath();
    ctx.arc(t.x,t.y,size*0.5,0,Math.PI*2);
    ctx.fill();
  }
  ctx.globalAlpha=1;

  // Body - packet triangle pointing up
  const cx=p.x,cy=p.y;
  const s=p.w*0.5;
  ctx.save();
  ctx.translate(cx,cy);

  // Pulse glow on collect
  const pulseExtra=p.pulseTimer>0?p.pulseTimer/0.2:0;
  const glowRadius=14+pulseExtra*8;

  // Glow
  const grd=ctx.createRadialGradient(0,0,2,0,0,glowRadius);
  grd.addColorStop(0,`rgba(0,255,255,${0.4+pulseExtra*0.3})`);
  grd.addColorStop(0.5,`rgba(0,255,255,${0.1+pulseExtra*0.2})`);
  grd.addColorStop(1,'rgba(0,255,255,0)');
  ctx.fillStyle=grd;
  ctx.beginPath();
  ctx.arc(0,0,glowRadius,0,Math.PI*2);
  ctx.fill();

  // Packet shape (hexagonal, like a data packet)
  const bodyBrightness=1+pulseExtra*0.4;
  ctx.fillStyle=`rgba(0,${Math.floor(255*bodyBrightness)},${Math.floor(255*bodyBrightness)},1)`;
  ctx.shadowColor='#00ffff';
  ctx.shadowBlur=8+pulseExtra*12;
  ctx.beginPath();
  const pts=6;
  for(let i=0;i<pts;i++){
    const a=i/pts*Math.PI*2-Math.PI/2;
    const r=i%2===0?s*0.9:s*1.1;
    const px=Math.cos(a)*r;
    const py=Math.sin(a)*r*0.85;
    i===0?ctx.moveTo(px,py):ctx.lineTo(px,py);
  }
  ctx.closePath();
  ctx.fill();
  ctx.shadowBlur=0;

  // Inner arrow
  ctx.fillStyle='rgba(0,200,255,0.6)';
  ctx.beginPath();
  ctx.moveTo(0,-5);
  ctx.lineTo(-5,5);
  ctx.lineTo(5,5);
  ctx.closePath();
  ctx.fill();

  ctx.restore();
}

// ────────────────────────────── FIREWALLS ───────────────────────────
function spawnFirewall(){
  const gapSize=clamp(200-G.difficulty*8,80,200);
  const gapX=rand(gapSize/2+20,W-gapSize/2-20);
  firewalls.push({
    x:0,y:-40,
    w:W,h:40,
    gapX:gapX-gapSize/2,
    gapW:gapSize,
    scrollOffset:0,
    pulse:rand(0,Math.PI*2),
  });
}
function updateFirewalls(dt){
  for(let i=firewalls.length-1;i>=0;i--){
    const f=firewalls[i];
    f.y+=G.scrollSpeed*dt;
    f.pulse+=dt*4;
    if(f.y>H+40){firewalls.splice(i,1);}
  }
}
function renderFirewalls(){
  for(const f of firewalls){
    const pulse=Math.sin(f.pulse)*0.15+0.85;
    // Background glow
    ctx.fillStyle=`rgba(255,50,50,${0.1*pulse})`;
    ctx.fillRect(0,f.y,f.w,f.h);

    // Left segment
    const grdL=ctx.createLinearGradient(0,f.y,0,f.y+f.h);
    grdL.addColorStop(0,`rgba(255,80,40,${0.7*pulse})`);
    grdL.addColorStop(0.5,`rgba(255,40,20,${0.9*pulse})`);
    grdL.addColorStop(1,`rgba(255,80,40,${0.7*pulse})`);
    ctx.fillStyle=grdL;
    ctx.shadowColor='#ff4422';
    ctx.shadowBlur=12*pulse;
    const leftEnd=f.gapX;
    if(leftEnd>0)ctx.fillRect(0,f.y,leftEnd,f.h);

    // Right segment
    const rightStart=f.gapX+f.gapW;
    if(rightStart<W){
      ctx.fillRect(rightStart,f.y,W-rightStart,f.h);
    }
    ctx.shadowBlur=0;

    // Gap edge highlights
    ctx.fillStyle=`rgba(255,255,255,${0.3*pulse})`;
    if(leftEnd>0)ctx.fillRect(leftEnd-2,f.y,2,f.h);
    if(rightStart<W)ctx.fillRect(rightStart,f.y,2,f.h);
  }
}
function checkFirewallCollision(){
  const p=player;
  const ph=p.h*0.4,pw=p.w*0.4;
  const cx=p.x,cy=p.y;
  for(const f of firewalls){
    const inGap=cx>=f.gapX+pw&&cx<=f.gapX+f.gapW-pw;
    if(!inGap&&cy>f.y&&cy<f.y+f.h)return true;
  }
  return false;
}

// ────────────────────────────── LOSS ZONES ──────────────────────────
function spawnLossZone(){
  const r=rand(25,50);
  lossZones.push({
    x:rand(r,W-r),y:-r*2,
    r,
    pulse:rand(0,Math.PI*2),
    scrollOffset:0,
  });
}
function updateLossZones(dt){
  for(let i=lossZones.length-1;i>=0;i--){
    const z=lossZones[i];
    z.y+=G.scrollSpeed*dt;
    z.pulse+=dt*3;
    if(z.y>H+z.r*2){lossZones.splice(i,1);}
  }
}
function renderLossZones(){
  for(const z of lossZones){
    const pulse=Math.sin(z.pulse)*0.2+0.8;
    // Outer glow
    const grd=ctx.createRadialGradient(z.x,z.y,2,z.x,z.y,z.r*1.3);
    grd.addColorStop(0,`rgba(120,0,180,${0.2*pulse})`);
    grd.addColorStop(0.6,`rgba(80,0,120,${0.3*pulse})`);
    grd.addColorStop(1,'rgba(80,0,120,0)');
    ctx.fillStyle=grd;
    ctx.beginPath();
    ctx.arc(z.x,z.y,z.r*1.3,0,Math.PI*2);
    ctx.fill();

    // Border ring
    ctx.strokeStyle=`rgba(160,40,200,${0.5*pulse})`;
    ctx.lineWidth=2;
    ctx.shadowColor='#8822aa';
    ctx.shadowBlur=8;
    ctx.beginPath();
    ctx.arc(z.x,z.y,z.r,0,Math.PI*2);
    ctx.stroke();
    ctx.shadowBlur=0;

    // Inner pattern - data corruption lines
    ctx.strokeStyle=`rgba(100,0,150,${0.3*pulse})`;
    ctx.lineWidth=1;
    for(let i=0;i<4;i++){
      const a=z.pulse+i*1.5;
      const r1=z.r*0.3;
      const r2=z.r*0.9;
      ctx.beginPath();
      ctx.moveTo(z.x+Math.cos(a)*r1,z.y+Math.sin(a)*r1);
      ctx.lineTo(z.x+Math.cos(a)*r2,z.y+Math.sin(a)*r2);
      ctx.stroke();
    }

    // Warning label
    ctx.fillStyle=`rgba(200,100,255,${0.4*pulse})`;
    ctx.font='8px monospace';
    ctx.textAlign='center';
    ctx.fillText('LOSS',z.x,z.y+3);
  }
}
function checkLossZoneCollision(){
  for(const z of lossZones){
    if(pointInCircle(player.x,player.y,z.x,z.y,z.r*0.8))return true;
  }
  return false;
}

// ────────────────────────────── ACKs ────────────────────────────────
function spawnACK(){
  acks.push({
    x:rand(40,W-40),y:-20,
    w:16,h:16,
    bobPhase:rand(0,Math.PI*2),
    collected:false,
  });
}
function updateACKs(dt){
  for(let i=acks.length-1;i>=0;i--){
    const a=acks[i];
    a.y+=G.scrollSpeed*dt;
    a.bobPhase+=dt*3;
    if(a.y>H+30){acks.splice(i,1);continue;}
  }
}
function renderACKs(){
  for(const a of acks){
    const bob=Math.sin(a.bobPhase)*4;
    const cx=a.x,cy=a.y+bob;
    // Glow
    const grd=ctx.createRadialGradient(cx,cy,2,cx,cy,14);
    grd.addColorStop(0,'rgba(0,255,136,0.3)');
    grd.addColorStop(1,'rgba(0,255,136,0)');
    ctx.fillStyle=grd;
    ctx.beginPath();
    ctx.arc(cx,cy,14,0,Math.PI*2);
    ctx.fill();

    // Diamond shape
    ctx.fillStyle='#00ff88';
    ctx.shadowColor='#00ff88';
    ctx.shadowBlur=10;
    ctx.beginPath();
    ctx.moveTo(cx,cy-8);
    ctx.lineTo(cx+8,cy);
    ctx.lineTo(cx,cy+8);
    ctx.lineTo(cx-8,cy);
    ctx.closePath();
    ctx.fill();
    ctx.shadowBlur=0;

    // Inner highlight
    ctx.fillStyle='rgba(150,255,200,0.5)';
    ctx.beginPath();
    ctx.moveTo(cx,cy-4);
    ctx.lineTo(cx+4,cy);
    ctx.lineTo(cx,cy+4);
    ctx.lineTo(cx-4,cy);
    ctx.closePath();
    ctx.fill();
  }
}
function checkACKCollision(){
  for(let i=acks.length-1;i>=0;i--){
    const a=acks[i];
    const bx=a.x-a.w/2,by=a.y-a.h/2;
    if(!a.collected&&rectOverlap(player,{x:bx,y:by,w:a.w,h:a.h})){
      a.collected=true;
      acks.splice(i,1);
      return true;
    }
  }
  return false;
}

// ────────────────────────────── BOSS ────────────────────────────────
function spawnBoss(){
  boss={
    x:W/2,y:-120,
    w:160,h:100,
    hp:100,
    maxHp:100,
    phase:0,
    phaseTimer:0,
    moveTimer:0,
    targetX:W/2,
    shootTimer:0,
    entered:false,
  };
  G.bossSpawned=true;
}
function updateBoss(dt){
  if(!boss||!boss.entered)return;
  const b=boss;
  b.moveTimer+=dt;
  b.phaseTimer+=dt;
  b.shootTimer+=dt;

  // Movement pattern
  if(b.moveTimer>2){
    b.targetX=rand(120,W-120);
    b.moveTimer=0;
  }
  b.x=lerp(b.x,b.targetX,dt*2);

  // Phase cycling
  if(b.phaseTimer>4){
    b.phase=(b.phase+1)%3;
    b.phaseTimer=0;
  }

  // Shooting
  const shootInterval=b.phase===0?1.2:b.phase===1?0.8:0.5;
  if(b.shootTimer>shootInterval){
    b.shootTimer=0;
    bossShoot();
  }
}
function bossShoot(){
  if(!boss)return;
  const b=boss;
  const bx=b.x,by=b.y+b.h/2;
  sfxShoot();
  switch(b.phase){
    case 0:{ // Spread
      for(let i=-1;i<=1;i++){
        const a=Math.PI/2+i*0.3+rand(-0.05,0.05);
        bossBullets.push({
          x:bx+rand(-20,20),y:by,
          vx:Math.cos(a)*280,
          vy:Math.sin(a)*280,
          r:5,
        });
      }
      break;
    }
    case 1:{ // Aimed
      const a=Math.atan2(player.y-by,player.x-bx)+rand(-0.1,0.1);
      const spd=320;
      bossBullets.push({
        x:bx,y:by,
        vx:Math.cos(a)*spd,
        vy:Math.sin(a)*spd,
        r:6,
      });
      break;
    }
    case 2:{ // Circular burst
      for(let i=0;i<8;i++){
        const a=i/8*Math.PI*2;
        const spd=200;
        bossBullets.push({
          x:bx,y:by,
          vx:Math.cos(a)*spd,
          vy:Math.sin(a)*spd,
          r:4,
        });
      }
      break;
    }
  }
}
function updateBossBullets(dt){
  for(let i=bossBullets.length-1;i>=0;i--){
    const b=bossBullets[i];
    b.x+=b.vx*dt;
    b.y+=b.vy*dt;
    // Trail particle
    if(Math.random()<0.4){
      particles.push({
        x:b.x,y:b.y,
        vx:rand(-10,10),vy:rand(-10,10),
        life:0.2,
        maxLife:0.2,
        color:'rgba(255,100,50,0.5)',
        size:rand(2,4),
        gravity:0,
      });
    }
    if(b.y>H+20||b.y<-20||b.x<-20||b.x>W+20){
      bossBullets.splice(i,1);
    }
  }
}
function renderBoss(){
  if(!boss)return;
  const b=boss;
  const cx=b.x,cy=b.y;

  // Shadow/glow
  ctx.shadowColor='#ff6600';
  ctx.shadowBlur=30;

  // Main body
  const grd=ctx.createLinearGradient(cx,cy,cx,cy+b.h);
  grd.addColorStop(0,'#2a1a0a');
  grd.addColorStop(0.3,'#3a2010');
  grd.addColorStop(0.7,'#2a1a0a');
  grd.addColorStop(1,'#1a0a00');
  ctx.fillStyle=grd;
  const r=8;
  ctx.beginPath();
  ctx.moveTo(cx-b.w/2+r,cy);
  ctx.lineTo(cx+b.w/2-r,cy);
  ctx.quadraticCurveTo(cx+b.w/2,cy,cx+b.w/2,cy+r);
  ctx.lineTo(cx+b.w/2,cy+b.h-r);
  ctx.quadraticCurveTo(cx+b.w/2,cy+b.h,cx+b.w/2-r,cy+b.h);
  ctx.lineTo(cx-b.w/2+r,cy+b.h);
  ctx.quadraticCurveTo(cx-b.w/2,cy+b.h,cx-b.w/2,cy+b.h-r);
  ctx.lineTo(cx-b.w/2,cy+r);
  ctx.quadraticCurveTo(cx-b.w/2,cy,cx-b.w/2+r,cy);
  ctx.closePath();
  ctx.fill();
  ctx.shadowBlur=0;

  // Edge glow
  ctx.strokeStyle='#ff6600';
  ctx.lineWidth=2;
  ctx.shadowColor='#ff6600';
  ctx.shadowBlur=8;
  ctx.stroke();
  ctx.shadowBlur=0;

  // Ports
  const portCount=6;
  for(let i=0;i<portCount;i++){
    const px=cx-b.w/2+20+i*(b.w-40)/portCount;
    const py=cy+b.h-15;
    const pOn=Math.floor(b.phaseTimer*3+i)%2===0;
    ctx.fillStyle=pOn?'#ff8800':'#442200';
    ctx.shadowColor=pOn?'#ff8800':'transparent';
    ctx.shadowBlur=pOn?6:0;
    ctx.fillRect(px-4,py-4,8,8);
    ctx.shadowBlur=0;
  }

  // Antenna
  ctx.strokeStyle='#666';
  ctx.lineWidth=2;
  ctx.beginPath();
  ctx.moveTo(cx-8,cy);
  ctx.lineTo(cx-8,cy-25);
  ctx.stroke();
  ctx.beginPath();
  ctx.moveTo(cx+8,cy);
  ctx.lineTo(cx+8,cy-25);
  ctx.stroke();
  // Antenna tip
  const tipGlow=Math.sin(G.time*6)*0.3+0.7;
  ctx.fillStyle=`rgba(255,50,0,${tipGlow})`;
  ctx.shadowColor='#ff3300';
  ctx.shadowBlur=12;
  ctx.beginPath();
  ctx.arc(cx-8,cy-27,4,0,Math.PI*2);
  ctx.fill();
  ctx.beginPath();
  ctx.arc(cx+8,cy-27,4,0,Math.PI*2);
  ctx.fill();
  ctx.shadowBlur=0;

  // Label
  ctx.fillStyle='rgba(255,100,50,0.6)';
  ctx.font='bold 11px monospace';
  ctx.textAlign='center';
  ctx.fillText('ROUTER',cx,cy+35);

  // Health bar
  const hbW=140,hbH=10;
  const hbX=cx-hbW/2,hbY=cy-50;
  ctx.fillStyle='rgba(0,0,0,0.6)';
  ctx.fillRect(hbX-1,hbY-1,hbW+2,hbH+2);
  const hpRatio=b.hp/b.maxHp;
  const hpColor=hpRatio>0.5?'#00ff88':hpRatio>0.25?'#ffaa00':'#ff3333';
  ctx.fillStyle=hpColor;
  ctx.shadowColor=hpColor;
  ctx.shadowBlur=6;
  ctx.fillRect(hbX,hbY,hbW*hpRatio,hbH);
  ctx.shadowBlur=0;
  ctx.fillStyle='rgba(255,255,255,0.5)';
  ctx.font='7px monospace';
  ctx.textAlign='center';
  ctx.fillText(`ROUTER ${Math.ceil(b.hp)}%`,cx,hbY+8);
}
function renderBossBullets(){
  for(const b of bossBullets){
    ctx.fillStyle='#ff6633';
    ctx.shadowColor='#ff4411';
    ctx.shadowBlur=10;
    ctx.beginPath();
    ctx.arc(b.x,b.y,b.r,0,Math.PI*2);
    ctx.fill();
    ctx.shadowBlur=0;
    // Core
    ctx.fillStyle='rgba(255,200,150,0.6)';
    ctx.beginPath();
    ctx.arc(b.x,b.y,b.r*0.5,0,Math.PI*2);
    ctx.fill();
  }
}

// ────────────────────────────── GAME LOGIC ──────────────────────────
function resetGame(){
  G.score=0;G.ackCount=0;G.scrollY=0;G.scrollSpeed=180;
  G.difficulty=1;G.time=0;G.bossTimer=0;G.bossPhase=0;
  G.bossSpawned=false;G.shake.intensity=0;G.flashAlpha=0;
  firewalls=[];lossZones=[];acks=[];particles=[];
  boss=null;bossBullets=[];floatingTexts=[];
  resetPlayer();
}

function startBossFight(){
  G.state='bossIntro';
  G.bossTimer=3;
  spawnBoss();
  sfxBossAppear();
  shake(12);
  // Clear existing obstacles for dramatic effect
  firewalls=[];lossZones=[];
}

function killPlayer(){
  sfxDeath();
  shake(12);
  G.flashAlpha=0.4;
  spawnParticles(player.x,player.y,40,'#ff3333',{minSpeed:60,maxSpeed:300,minSize:2,maxSize:6});
  G.state='gameover';
  if(G.score>G.highScore){
    G.highScore=G.score;
    localStorage.setItem('packetrun_high',G.score);
  }
}

function winGame(){
  sfxWin();
  shake(6);
  spawnParticles(player.x,player.y,60,'#00ff88',{minSpeed:40,maxSpeed:200,minSize:2,maxSize:5});
  bossBullets=[]; // Clear remaining bullets
  G.state='victory';
  if(G.score>G.highScore){
    G.highScore=G.score;
    localStorage.setItem('packetrun_high',G.score);
  }
}

function update(dt){
  if(G.state==='countdown'){
    G.countdownTimer-=dt;
    if(G.countdownTimer<=0){G.state='playing';}
    return;
  }

  // Keep particles/fx alive on gameover/victory
  if(G.state==='gameover'||G.state==='victory'){
    if(G.flashAlpha>0)G.flashAlpha=Math.max(0,G.flashAlpha-dt*2);
    updateParticles(dt);
    updateFloatingText(dt);
    return;
  }

  if(G.state!=='playing'&&G.state!=='boss'&&G.state!=='bossIntro')return;

  G.time+=dt;

  // Difficulty ramp
  G.difficulty=1+Math.floor(G.time/8);
  G.scrollSpeed=clamp(180+G.difficulty*6,180,400);

  if(G.state==='bossIntro'){
    G.bossTimer-=dt;
    if(boss){
      boss.y=lerp(boss.y,100,dt*2);
      if(boss.y>80&&!boss.entered){boss.entered=true;G.state='boss';}
    }
    return;
  }

  // Player
  updatePlayer(dt);

  // Spawn obstacles
  const spawnInterval=Math.max(0.5,2-G.difficulty*0.06);
  if(Math.random()<dt/spawnInterval*0.6)spawnFirewall();
  if(Math.random()<dt/3*0.4)spawnLossZone();
  if(Math.random()<dt/1.8)spawnACK();

  // Update entities
  updateFirewalls(dt);
  updateLossZones(dt);
  updateACKs(dt);

  // Collision - firewalls
  if(checkFirewallCollision()){killPlayer();return;}
  if(checkLossZoneCollision()){killPlayer();return;}

  // Boss
  if(G.state==='boss'){
    updateBoss(dt);
    updateBossBullets(dt);

    // Boss bullet collision with player
    for(let i=bossBullets.length-1;i>=0;i--){
      const b=bossBullets[i];
      if(dist(player.x,player.y,b.x,b.y)<b.r+10){
        killPlayer();return;
      }
    }

    updateACKs(dt);
  }

  // Collision - ACKs (single check, works for both normal and boss)
  if(checkACKCollision()){
    sfxPickup();
    G.ackCount++;
    G.score++;
    player.pulseTimer=0.2;
    shake(2);
    addFloatingText(player.x,player.y-10,'+1 ACK','#00ff88');
    spawnParticles(player.x,player.y,12,'#00ff88',{minSpeed:30,maxSpeed:100,minSize:1,maxSize:3});

    if(G.state==='boss'){
      // During boss, ACKs also damage it
      sfxBossHit();
      G.score++;
      shake(4);
      addFloatingText(player.x,player.y-25,'+1 DMG','#ff8800');
      spawnParticles(player.x,player.y,15,'#ff8800',{minSpeed:30,maxSpeed:120,minSize:1,maxSize:4});
      if(boss){boss.hp-=10;if(boss.hp<=0){winGame();return;}}
    }else{
      // Check for boss trigger
      if(G.ackCount>=10&&!G.bossSpawned){
        startBossFight();
        return;
      }
    }
  }

  // Particles & effects
  updateParticles(dt);
  updateFloatingText(dt);
  updateShake(dt);
}

// ────────────────────────────── RENDERING ───────────────────────────
function drawBackground(){
  // Sky gradient
  const grd=ctx.createLinearGradient(0,0,0,H);
  grd.addColorStop(0,'#06061a');
  grd.addColorStop(0.5,'#0a0a2a');
  grd.addColorStop(1,'#0a0a1a');
  ctx.fillStyle=grd;
  ctx.fillRect(0,0,W,H);

  // Far background grid (slow parallax)
  const farGridSize=80;
  const farOffsetY=(G.scrollY*0.3)%farGridSize;
  ctx.strokeStyle='rgba(0,255,255,0.015)';
  ctx.lineWidth=0.5;
  for(let x=0;x<=W;x+=farGridSize){
    ctx.beginPath();ctx.moveTo(x,0);ctx.lineTo(x,H);ctx.stroke();
  }
  for(let y=-farGridSize+farOffsetY;y<H+farGridSize;y+=farGridSize){
    ctx.beginPath();ctx.moveTo(0,y);ctx.lineTo(W,y);ctx.stroke();
  }

  // Main grid
  const gridSize=50;
  const offsetY=G.scrollY%gridSize;
  ctx.strokeStyle='rgba(0,255,255,0.03)';
  ctx.lineWidth=1;
  for(let x=0;x<=W;x+=gridSize){
    ctx.beginPath();ctx.moveTo(x,0);ctx.lineTo(x,H);ctx.stroke();
  }
  for(let y=-gridSize+offsetY;y<H+gridSize;y+=gridSize){
    ctx.beginPath();ctx.moveTo(0,y);ctx.lineTo(W,y);ctx.stroke();
  }

  // Nodes at grid intersections (some of them)
  for(let x=0;x<=W;x+=gridSize){
    for(let y=-gridSize+offsetY;y<H+gridSize;y+=gridSize){
      if(Math.floor((x*7+y*13)%7)===0){
        const pulse=Math.sin(G.time*2+x*0.01+y*0.01)*0.3+0.7;
        ctx.fillStyle=`rgba(0,255,255,${0.05*pulse})`;
        ctx.beginPath();
        ctx.arc(x,y,2,0,Math.PI*2);
        ctx.fill();
        // Connection lines
        if(Math.floor((x*7+y*13)%3)===0){
          ctx.strokeStyle=`rgba(0,255,255,${0.015*pulse})`;
          ctx.lineWidth=0.5;
          ctx.beginPath();
          ctx.moveTo(x,y);
          ctx.lineTo(x+gridSize,y+gridSize);
          ctx.stroke();
          ctx.beginPath();
          ctx.moveTo(x,y);
          ctx.lineTo(x-gridSize,y+gridSize);
          ctx.stroke();
        }
      }
    }
  }

  // Scrolling data lines
  ctx.strokeStyle='rgba(0,255,255,0.015)';
  ctx.lineWidth=1;
  for(let i=0;i<5;i++){
    const lx=(i*173+Math.sin(G.time*0.3+i)*50)%W;
    const ly=((G.time*80+i*200)%(H*2))-H;
    ctx.beginPath();
    ctx.moveTo(lx,ly);
    ctx.lineTo(lx+rand(-20,20),ly+rand(30,80));
    ctx.stroke();
  }

  // Speed lines at higher difficulties
  if(G.difficulty>2){
    const speedLineAlpha=clamp((G.difficulty-2)*0.02,0,0.15);
    ctx.strokeStyle=`rgba(0,255,255,${speedLineAlpha})`;
    ctx.lineWidth=1;
    for(let i=0;i<G.difficulty*2;i++){
      const sx=rand(0,W);
      const sy=rand(0,H);
      const len=rand(40,120);
      ctx.beginPath();
      ctx.moveTo(sx,sy);
      ctx.lineTo(sx+rand(-4,4),sy+len);
      ctx.stroke();
    }
  }
}

function drawHUD(){
  ctx.fillStyle='rgba(0,0,0,0.3)';
  ctx.fillRect(0,0,W,32);

  // Score
  ctx.fillStyle='#ffffff';
  ctx.font='bold 13px monospace';
  ctx.textAlign='left';
  ctx.fillText(`ACKs: ${G.ackCount}`,12,22);

  // Distance
  ctx.textAlign='center';
  ctx.fillStyle='rgba(0,255,255,0.5)';
  ctx.fillText(`HOP ${Math.floor(G.time/2)}`,W/2,22);

  // Score
  ctx.textAlign='right';
  ctx.fillStyle='#ffcc00';
  ctx.fillText(`SCORE: ${G.score}`,W-12,22);

  // High score
  ctx.fillStyle='rgba(255,255,255,0.3)';
  ctx.font='10px monospace';
  ctx.textAlign='right';
  ctx.fillText(`HI: ${G.highScore}`,W-12,32);
}

function drawStartScreen(){
  // Background
  ctx.fillStyle='#06061a';
  ctx.fillRect(0,0,W,H);

  // Animated background particles
  for(let i=0;i<60;i++){
    const x=(i*173+Math.sin(G.time*0.5+i)*30)%W;
    const y=(i*97+G.time*20)%H;
    const alpha=Math.sin(G.time*2+i)*0.1+0.1;
    ctx.fillStyle=`rgba(0,255,255,${alpha})`;
    ctx.beginPath();
    ctx.arc(x,y,1.5,0,Math.PI*2);
    ctx.fill();
  }

  // Connecting lines between close particles
  ctx.strokeStyle='rgba(0,255,255,0.03)';
  ctx.lineWidth=0.5;
  for(let i=0;i<30;i++){
    const x1=(i*173+Math.sin(G.time*0.3+i)*30)%W;
    const y1=(i*97+G.time*20)%H;
    const x2=((i+7)*173+Math.sin(G.time*0.3+i*2)*30)%W;
    const y2=((i+7)*97+G.time*20)%H;
    if(Math.abs(x1-x2)<300&&Math.abs(y1-y2)<150){
      ctx.beginPath();ctx.moveTo(x1,y1);ctx.lineTo(x2,y2);ctx.stroke();
    }
  }

  // Title
  const titleY=200;
  ctx.save();

  // Title glow
  ctx.shadowColor='#00ffff';
  ctx.shadowBlur=40;
  ctx.fillStyle='#00ffff';
  ctx.font='bold 56px monospace';
  ctx.textAlign='center';
  ctx.fillText('PACKET RUN',W/2,titleY);
  ctx.shadowBlur=0;

  // Subtitle
  ctx.fillStyle='rgba(255,255,255,0.4)';
  ctx.font='14px monospace';
  ctx.fillText('A TCP Packet\'s Journey Through the Network',W/2,titleY+30);

  // Instructions
  ctx.fillStyle='rgba(255,255,255,0.5)';
  ctx.font='12px monospace';
  ctx.fillText('Use  ARROW KEYS  to navigate',W/2,370);
  ctx.fillText('Dodge  FIREWALLS  and  PACKET-LOSS ZONES',W/2,392);
  ctx.fillText('Collect  ACKs  for points',W/2,414);

  // Blinking start prompt
  const blinkAlpha=Math.sin(G.time*3)*0.3+0.7;
  ctx.fillStyle=`rgba(0,255,255,${blinkAlpha})`;
  ctx.font='bold 18px monospace';
  ctx.fillText('[ PRESS SPACE TO CONNECT ]',W/2,490);

  // High score
  if(G.highScore>0){
    ctx.fillStyle='rgba(255,255,255,0.2)';
    ctx.font='11px monospace';
    ctx.fillText(`High Score: ${G.highScore}`,W/2,530);
  }

  // Version/credit
  ctx.fillStyle='rgba(255,255,255,0.1)';
  ctx.font='9px monospace';
  ctx.fillText('protocol: TCP | port: 80 | ttl: ∞',W/2,570);
  ctx.restore();
}

function drawCountdown(){
  const t=G.countdownTimer;
  const alpha=clamp(t/0.3,0,1);
  ctx.save();
  ctx.textAlign='center';
  ctx.textBaseline='middle';
  ctx.shadowColor='#00ffff';

  if(t>1.5){
    ctx.shadowBlur=30;
    ctx.fillStyle=`rgba(0,255,255,${alpha})`;
    ctx.font='bold 72px monospace';
    ctx.fillText('3',W/2,H/2);
  }else if(t>1){
    ctx.shadowBlur=30;
    ctx.fillStyle=`rgba(0,255,255,${alpha})`;
    ctx.font='bold 72px monospace';
    ctx.fillText('2',W/2,H/2);
  }else if(t>0.5){
    ctx.shadowBlur=30;
    ctx.fillStyle=`rgba(0,255,255,${alpha})`;
    ctx.font='bold 72px monospace';
    ctx.fillText('1',W/2,H/2);
  }else if(t>0.2){
    const goAlpha=clamp((t-0.2)/0.3,0,1);
    ctx.shadowBlur=40;
    ctx.fillStyle=`rgba(0,255,136,${goAlpha})`;
    ctx.font='bold 64px monospace';
    ctx.fillText('GO!',W/2,H/2);
  }

  ctx.shadowBlur=0;
  ctx.textBaseline='alphabetic';
  ctx.restore();
}

function drawBossIntro(){
  ctx.fillStyle='rgba(0,0,0,0.5)';
  ctx.fillRect(0,0,W,H);
  const alpha=clamp((3-G.bossTimer)/1.5,0,1);
  const shakeX=Math.random()*4-2;
  const shakeY=Math.random()*4-2;
  ctx.save();
  ctx.translate(shakeX,shakeY);
  ctx.fillStyle=`rgba(255,50,0,${alpha})`;
  ctx.font='bold 28px monospace';
  ctx.textAlign='center';
  ctx.shadowColor='#ff3300';
  ctx.shadowBlur=30;
  ctx.fillText('⚠  WARNING: ROUTER BOSS DETECTED  ⚠',W/2,250);
  ctx.shadowBlur=0;
  ctx.fillStyle=`rgba(255,100,50,${alpha*0.7})`;
  ctx.font='14px monospace';
  ctx.fillText('Dodge incoming packets and collect ACKs to overload it',W/2,290);
  ctx.restore();
}

function drawGameOver(){
  ctx.fillStyle='rgba(0,0,0,0.7)';
  ctx.fillRect(0,0,W,H);

  ctx.fillStyle='#ff3333';
  ctx.font='bold 40px monospace';
  ctx.textAlign='center';
  ctx.shadowColor='#ff0000';
  ctx.shadowBlur=20;
  ctx.fillText('CONNECTION LOST',W/2,220);
  ctx.shadowBlur=0;

  ctx.fillStyle='rgba(255,255,255,0.6)';
  ctx.font='16px monospace';
  ctx.fillText(`ACKs Collected: ${G.ackCount}`,W/2,280);
  ctx.fillText(`Score: ${G.score}`,W/2,310);

  if(G.score>=G.highScore&&G.score>0){
    ctx.fillStyle='#ffcc00';
    ctx.font='bold 14px monospace';
    ctx.fillText('★ NEW HIGH SCORE! ★',W/2,345);
  }else{
    ctx.fillStyle='rgba(255,255,255,0.3)';
    ctx.font='13px monospace';
    ctx.fillText(`High Score: ${G.highScore}`,W/2,345);
  }

  const blinkAlpha=Math.sin(G.time*3)*0.3+0.7;
  ctx.fillStyle=`rgba(255,255,255,${blinkAlpha})`;
  ctx.font='bold 16px monospace';
  ctx.fillText('[ PRESS SPACE TO RETRY ]',W/2,430);
}

function drawVictory(){
  ctx.fillStyle='rgba(0,0,0,0.7)';
  ctx.fillRect(0,0,W,H);

  ctx.fillStyle='#00ff88';
  ctx.font='bold 36px monospace';
  ctx.textAlign='center';
  ctx.shadowColor='#00ff88';
  ctx.shadowBlur=30;
  ctx.fillText('CONNECTION ESTABLISHED',W/2,210);
  ctx.shadowBlur=0;

  ctx.fillStyle='rgba(255,255,255,0.8)';
  ctx.font='16px monospace';
  ctx.fillText('Destination Reached!',W/2,255);

  ctx.fillStyle='rgba(255,255,255,0.5)';
  ctx.font='14px monospace';
  ctx.fillText(`ACKs Collected: ${G.ackCount}`,W/2,300);
  ctx.fillText(`Final Score: ${G.score}`,W/2,325);

  if(G.score>=G.highScore&&G.score>0){
    ctx.fillStyle='#ffcc00';
    ctx.font='bold 14px monospace';
    ctx.fillText('★ NEW HIGH SCORE! ★',W/2,360);
  }else{
    ctx.fillStyle='rgba(255,255,255,0.3)';
    ctx.font='13px monospace';
    ctx.fillText(`High Score: ${G.highScore}`,W/2,360);
  }

  const blinkAlpha=Math.sin(G.time*3)*0.3+0.7;
  ctx.fillStyle=`rgba(0,255,136,${blinkAlpha})`;
  ctx.font='bold 16px monospace';
  ctx.fillText('[ PRESS SPACE TO PLAY AGAIN ]',W/2,440);

  // Celebration particles
  if(Math.random()<0.3){
    spawnParticles(rand(50,W-50),rand(50,H-50),1,'#00ff88',{minSpeed:20,maxSpeed:80,minSize:1,maxSize:3});
  }
  // Also gold particles
  if(Math.random()<0.15){
    spawnParticles(rand(50,W-50),rand(50,H-50),1,'#ffcc00',{minSpeed:20,maxSpeed:60,minSize:1,maxSize:3});
  }
}

function render(){
  ctx.save();

  // Apply screen shake (also lingers into gameover/victory)
  if(G.state!=='menu'&&G.shake.intensity>0.5){
    ctx.translate(G.shake.x,G.shake.y);
  }

  if(G.state==='menu'){
    drawStartScreen();
    ctx.restore();
    return;
  }

  // Game rendering
  drawBackground();

  // Screen flash overlay
  if(G.flashAlpha>0){
    ctx.fillStyle=`rgba(255,255,255,${clamp(G.flashAlpha,0,1)})`;
    ctx.fillRect(0,0,W,H);
  }

  // Scroll offset for background
  G.scrollY+=G.scrollSpeed*(1/60);

  // Boss (behind entities)
  if(boss&&boss.entered)renderBoss();

  // Entities
  renderFirewalls();
  renderLossZones();
  renderACKs();
  renderBossBullets();

  // Player (only if alive)
  if(G.state==='playing'||G.state==='boss'){
    renderPlayer();
  }

  // Particles
  renderParticles();
  renderFloatingText();

  ctx.restore(); // Remove shake transform

  // UI (no shake)
  if(G.state!=='menu'){
    drawHUD();
  }

  // Overlays
  if(G.state==='countdown')drawCountdown();
  if(G.state==='bossIntro')drawBossIntro();
  if(G.state==='gameover')drawGameOver();
  if(G.state==='victory')drawVictory();
}

// ────────────────────────────── GAME LOOP ───────────────────────────
let lastTime=0;
function gameLoop(timestamp){
  const dt=Math.min((timestamp-lastTime)/1000,0.033);
  lastTime=timestamp;

  update(dt);
  render();

  requestAnimationFrame(gameLoop);
}

// ────────────────────────────── RESIZE ──────────────────────────────
function resizeCanvas(){
  const maxW=window.innerWidth*0.95;
  const maxH=window.innerHeight*0.95;
  const scale=Math.min(maxW/W,maxH/H);
  canvas.style.width=(W*scale)+'px';
  canvas.style.height=(H*scale)+'px';
}
window.addEventListener('resize',resizeCanvas);
resizeCanvas();

// ────────────────────────────── START ───────────────────────────────
gameLoop(0);
</script>
